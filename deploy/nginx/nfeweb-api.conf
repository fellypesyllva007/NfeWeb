# Nginx reverse proxy para NfeWeb API
#
# Domínio atual:
#   webnfe.ddns.net
#
# Instalar em:
#   /etc/nginx/sites-available/nfeweb-api.conf
#
# Habilitar com:
#   sudo ln -sf /etc/nginx/sites-available/nfeweb-api.conf /etc/nginx/sites-enabled/nfeweb-api.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# A API deve escutar somente localmente em 127.0.0.1:3333.

upstream nfeweb_api_upstream {
    server 127.0.0.1:3333;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    server_name webnfe.ddns.net;

    access_log /var/log/nginx/nfeweb-api.access.log;
    error_log  /var/log/nginx/nfeweb-api.error.log warn;

    client_max_body_size 20m;

    location = /health {
        proxy_pass http://nfeweb_api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://nfeweb_api_upstream/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        return 200 'NfeWeb API gateway ativo em webnfe.ddns.net\n';
        add_header Content-Type text/plain;
    }
}
